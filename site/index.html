<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#120a04" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Saadi Awaaz · Punjabi Music</title>
<meta name="description" content="Punjabi music — new singles, new albums, top singles." />
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%23120a04'/><circle cx='32' cy='32' r='14' fill='none' stroke='%23f0b323' stroke-width='3'/><circle cx='32' cy='32' r='3' fill='%23f0b323'/></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,700;9..144,900&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="grain" aria-hidden="true"></div>

<header class="masthead">
  <div class="masthead__row">
    <div class="brand">
      <svg class="brand__mark" viewBox="0 0 64 64" aria-hidden="true">
        <circle cx="32" cy="32" r="22" fill="none" stroke="currentColor" stroke-width="2"/>
        <circle cx="32" cy="32" r="14" fill="none" stroke="currentColor" stroke-width="2"/>
        <circle cx="32" cy="32" r="3" fill="currentColor"/>
      </svg>
      <div class="brand__text">
        <span class="brand__name">Saadi&nbsp;Awaaz</span>
        <span class="brand__sub">Punjabi Music</span>
      </div>
    </div>
    <div class="masthead__meta">
      <span class="dot"></span>
      <span id="lastUpdated">live feed</span>
    </div>
  </div>
  <div class="masthead__hairline"></div>
  <nav class="sectionnav" aria-label="Sections">
    <a href="#new_singles" class="sectionnav__link">New Singles</a>
    <a href="#new_albums"  class="sectionnav__link">New Albums</a>
    <a href="#top_singles" class="sectionnav__link">Top 50 Singles</a>
  </nav>
</header>

<main id="app">
  <div class="loading" id="loading">
    <div class="loading__spinner"></div>
    <p>Loading…</p>
  </div>
</main>

<!-- DETAIL SHEET -->
<dialog id="detailSheet" class="sheet" aria-labelledby="sheetTitle">
  <button class="sheet__close" aria-label="Close" data-close>&times;</button>
  <div class="sheet__inner">
    <div class="sheet__cover-wrap">
      <img id="sheetCover" class="sheet__cover" alt="" />
    </div>
    <div class="sheet__body">
      <p class="sheet__kicker" id="sheetKicker"></p>
      <h2 class="sheet__title" id="sheetTitle"></h2>
      <p class="sheet__artist" id="sheetArtist"></p>

      <dl class="sheet__facts" id="sheetFacts"></dl>

      <div class="sheet__actions">
        <button class="btn btn--primary" id="sheetPlayBtn">▶ &nbsp;Play</button>
      </div>

      <div class="sheet__downloads" id="sheetDownloads"></div>
    </div>
  </div>
</dialog>

<!-- PERSISTENT PLAYER (mini bar) — hidden until first play -->
<div class="player" id="player" hidden>
  <button class="player__expand" id="btnExpand" aria-label="Expand player">
    <div class="player__cover-wrap">
      <img id="playerCover" alt="" />
    </div>
    <div class="player__meta">
      <div class="player__title" id="playerTitle">—</div>
      <div class="player__artist" id="playerArtist">—</div>
    </div>
  </button>
  <audio id="audio" preload="none"></audio>
  <div class="player__controls">
    <button class="iconbtn" id="btnPrev" aria-label="Previous">
      <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zM20 6v12L9 12z" fill="currentColor"/></svg>
    </button>
    <button class="iconbtn iconbtn--play" id="btnPlay" aria-label="Play/Pause">
      <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
      <svg id="iconPause" viewBox="0 0 24 24" style="display:none"><path d="M6 5h4v14H6zM14 5h4v14h-4z" fill="currentColor"/></svg>
    </button>
    <button class="iconbtn" id="btnNext" aria-label="Next">
      <svg viewBox="0 0 24 24"><path d="M16 6h2v12h-2zM4 6v12l11-6z" fill="currentColor"/></svg>
    </button>
  </div>
  <div class="player__scrub">
    <span id="curTime">0:00</span>
    <div class="scrub" id="scrub"><div class="scrub__fill" id="scrubFill"></div></div>
    <span id="totTime">0:00</span>
  </div>
  <button class="iconbtn player__close" id="btnClose" aria-label="Close player">&times;</button>
</div>

<!-- EXPANDED NOW-PLAYING (mobile full-screen) -->
<div class="np" id="nowPlaying" hidden aria-hidden="true">
  <div class="np__handle" id="npHandle" aria-label="Drag to dismiss"></div>
  <button class="np__chev" id="btnCollapse" aria-label="Collapse player">
    <svg viewBox="0 0 24 24" width="22" height="22"><path d="M7 10l5 5 5-5z" fill="currentColor"/></svg>
  </button>
  <div class="np__cover-wrap">
    <img id="npCover" class="np__cover" alt="" />
  </div>
  <div class="np__meta">
    <h2 class="np__title" id="npTitle">—</h2>
    <p class="np__artist" id="npArtist">—</p>
  </div>
  <div class="np__scrub">
    <div class="scrub" id="npScrub"><div class="scrub__fill" id="npScrubFill"></div></div>
    <div class="np__times">
      <span id="npCurTime">0:00</span>
      <span id="npTotTime">0:00</span>
    </div>
  </div>
  <div class="np__controls">
    <button class="np__btn" id="npPrev" aria-label="Previous">
      <svg viewBox="0 0 24 24" width="30" height="30"><path d="M6 6h2v12H6zM20 6v12L9 12z" fill="currentColor"/></svg>
    </button>
    <button class="np__btn np__btn--play" id="npPlay" aria-label="Play/Pause">
      <svg id="npIconPlay" viewBox="0 0 24 24" width="36" height="36"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
      <svg id="npIconPause" viewBox="0 0 24 24" width="36" height="36" style="display:none"><path d="M6 5h4v14H6zM14 5h4v14h-4z" fill="currentColor"/></svg>
    </button>
    <button class="np__btn" id="npNext" aria-label="Next">
      <svg viewBox="0 0 24 24" width="30" height="30"><path d="M16 6h2v12h-2zM4 6v12l11-6z" fill="currentColor"/></svg>
    </button>
  </div>
  <button class="np__source" id="npSource" type="button">View details</button>
</div>

<script src="app.js"></script>
</body>
</html>

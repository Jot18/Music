<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0b" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Saadi Awaaz · Punjabi Music</title>
<meta name="description" content="A private Punjabi music library." />
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%230a0a0b'/><path d='M32 14 L46 50 L18 50 Z' fill='%23ffb547'/></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css?v=7.7" />
</head>
<body>

<!-- LOGIN GATE -->
<div class="gate" id="loginGate">
  <form class="gate__card" id="loginForm" autocomplete="off">
    <div class="gate__logo">
      <svg viewBox="0 0 64 64" width="36" height="36" aria-hidden="true">
        <path d="M32 14 L46 50 L18 50 Z" fill="currentColor"/>
      </svg>
    </div>
    <h1 class="gate__title">Saadi Awaaz</h1>
    <p class="gate__sub">Enter your access code</p>
    <input id="loginInput" type="password" class="gate__input"
           placeholder="••••••••" aria-label="Access code"
           autocomplete="current-password" />
    <button class="gate__btn" type="submit">Continue</button>
    <p class="gate__error" id="loginError" hidden>Incorrect code</p>
  </form>
</div>

<!-- APP SHELL -->
<div class="app" id="appShell" hidden>

  <!-- DESKTOP/TABLET SIDEBAR -->
  <aside class="sidebar" aria-label="Navigation">
    <div class="sidebar__brand">
      <svg viewBox="0 0 64 64" width="26" height="26" aria-hidden="true">
        <path d="M32 14 L46 50 L18 50 Z" fill="currentColor"/>
      </svg>
      <span class="sidebar__brand-name">Saadi Awaaz</span>
    </div>

    <nav class="sidebar__nav" aria-label="Sections">
      <a href="#new_singles" class="navlink">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M13 2 4 14h6l-1 8 9-12h-6z"/></svg>
        <span class="navlink__full">New Singles</span>
        <span class="navlink__short">Singles</span>
      </a>
      <a href="#new_albums" class="navlink">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 14a4 4 0 1 1 4-4 4 4 0 0 1-4 4z"/></svg>
        <span class="navlink__full">New Albums</span>
        <span class="navlink__short">Albums</span>
      </a>
      <a href="#top_singles" class="navlink">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M3 17l6-6 4 4 8-8v4h2V3h-8v2h4l-6 6-4-4-8 8z"/></svg>
        <span class="navlink__full">Top 50 Singles</span>
        <span class="navlink__short">Top Singles</span>
      </a>
      <a href="#top_punjabi" class="navlink">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M7 4v3H3v3a4 4 0 0 0 4 4 5 5 0 0 0 4 2.9V20H7v2h10v-2h-4v-3.1a5 5 0 0 0 4-2.9 4 4 0 0 0 4-4V7h-4V4z"/></svg>
        <span class="navlink__full">Top 50 Album Songs</span>
        <span class="navlink__short">Top Album</span>
      </a>
    </nav>

    <div class="sidebar__foot">
      <span class="sidebar__updated" id="lastUpdated">syncing…</span>
      <button id="logoutBtn" class="sidebar__logout" aria-label="Sign out">
        <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path fill="currentColor" d="M10 17l5-5-5-5v3H3v4h7v3zm5-15h4a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2h-4v-2h4V4h-4z"/></svg>
        <span>Sign out</span>
      </button>
    </div>
  </aside>

  <!-- MOBILE TOP BAR -->
  <header class="topbar">
    <div class="topbar__brand">
      <svg viewBox="0 0 64 64" width="22" height="22" aria-hidden="true">
        <path d="M32 14 L46 50 L18 50 Z" fill="currentColor"/>
      </svg>
      <span>Saadi Awaaz</span>
    </div>
    <button id="mobileLogout" class="topbar__logout" aria-label="Sign out">
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M10 17l5-5-5-5v3H3v4h7v3zm5-15h4a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2h-4v-2h4V4h-4z"/></svg>
    </button>
  </header>

  <main class="main">

    <!-- STICKY SEARCH -->
    <div class="stickyhead">
      <div class="search" role="search">
        <svg class="search__icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/>
          <path d="M20 20l-3.5-3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input id="searchInput" type="search" class="search__input"
               placeholder="Search artists, songs, albums…"
               aria-label="Search library"
               autocomplete="off" autocorrect="off" spellcheck="false" />
        <kbd class="search__kbd">⌘K</kbd>
        <button id="searchClear" class="search__clear" aria-label="Clear search" hidden>×</button>
      </div>
    </div>

    <div id="app">
      <div class="loading" id="loading">
        <div class="loading__spinner"></div>
        <p>Loading library…</p>
      </div>
    </div>
  </main>

  <!-- MOBILE BOTTOM TAB BAR -->
  <nav class="tabbar" aria-label="Sections">
    <a href="#new_singles" class="tab">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path fill="currentColor" d="M13 2 4 14h6l-1 8 9-12h-6z"/></svg>
      <span>Singles</span>
    </a>
    <a href="#new_albums" class="tab">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path fill="currentColor" d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 14a4 4 0 1 1 4-4 4 4 0 0 1-4 4z"/></svg>
      <span>Albums</span>
    </a>
    <a href="#top_singles" class="tab">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path fill="currentColor" d="M3 17l6-6 4 4 8-8v4h2V3h-8v2h4l-6 6-4-4-8 8z"/></svg>
      <span>Top Singles</span>
    </a>
    <a href="#top_punjabi" class="tab">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path fill="currentColor" d="M7 4v3H3v3a4 4 0 0 0 4 4 5 5 0 0 0 4 2.9V20H7v2h10v-2h-4v-3.1a5 5 0 0 0 4-2.9 4 4 0 0 0 4-4V7h-4V4z"/></svg>
      <span>Top Album</span>
    </a>
  </nav>
</div>

<!-- DETAIL SHEET -->
<dialog id="detailSheet" class="sheet" aria-labelledby="sheetTitle">
  <div class="sheet__inner">
    <button class="sheet__close" aria-label="Close" data-close>
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </button>

    <div class="sheet__left">
      <div class="sheet__cover-wrap">
        <img id="sheetCover" class="sheet__cover" alt="" />
      </div>

      <div class="sheet__leftmeta">
        <p class="sheet__kicker" id="sheetKicker"></p>
        <h2 class="sheet__title" id="sheetTitle"></h2>
        <p class="sheet__artist" id="sheetArtist"></p>

        <dl class="sheet__facts" id="sheetFacts"></dl>

        <div class="sheet__actions">
          <button class="btn btn--primary" id="sheetPlayBtn">
            <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
            <span>Play</span>
          </button>
          <a class="btn btn--yt" id="sheetYtBtn" target="_blank" rel="noopener" href="#">
            <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M21.58 7.19a2.51 2.51 0 0 0-1.77-1.77C18.25 5 12 5 12 5s-6.25 0-7.81.42A2.51 2.51 0 0 0 2.42 7.19 26.06 26.06 0 0 0 2 12a26.06 26.06 0 0 0 .42 4.81 2.51 2.51 0 0 0 1.77 1.77C5.75 19 12 19 12 19s6.25 0 7.81-.42a2.51 2.51 0 0 0 1.77-1.77A26.06 26.06 0 0 0 22 12a26.06 26.06 0 0 0-.42-4.81zM10 15V9l5.2 3z"/></svg>
            <span>YouTube</span>
          </a>
        </div>
      </div>
    </div>

    <div class="sheet__right">
      <div class="sheet__tracks" id="sheetTracks" hidden></div>
      <div class="sheet__downloads" id="sheetDownloads"></div>
    </div>
  </div>
</dialog>

<!-- MINI PLAYER -->
<div class="player" id="player" hidden>
  <button class="player__expand" id="btnExpand" aria-label="Open now playing">
    <div class="player__cover-wrap">
      <img id="playerCover" alt="" />
    </div>
    <div class="player__meta">
      <div class="player__title" id="playerTitle">—</div>
      <div class="player__artist" id="playerArtist">—</div>
    </div>
  </button>
  <audio id="audio" preload="none"></audio>
  <div class="player__controls">
    <button class="iconbtn" id="btnPrev" aria-label="Previous">
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M6 6h2v12H6zM20 6v12L9 12z"/></svg>
    </button>
    <button class="iconbtn iconbtn--play" id="btnPlay" aria-label="Play/Pause">
      <svg id="iconPlay" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
      <svg id="iconPause" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" style="display:none"><path fill="currentColor" d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
    </button>
    <button class="iconbtn" id="btnNext" aria-label="Next">
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M16 6h2v12h-2zM4 6v12l11-6z"/></svg>
    </button>
  </div>
  <div class="player__scrub">
    <span id="curTime">0:00</span>
    <div class="scrub" id="scrub"><div class="scrub__fill" id="scrubFill"></div></div>
    <span id="totTime">0:00</span>
  </div>
  <button class="iconbtn player__close" id="btnClose" aria-label="Close player">×</button>
</div>

<!-- MOBILE NOW-PLAYING (full screen) -->
<div class="np" id="nowPlaying" hidden aria-hidden="true">
  <button class="np__chev" id="btnCollapse" aria-label="Collapse player">
    <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path fill="currentColor" d="M7 10l5 5 5-5z"/></svg>
  </button>
  <button class="np__details" id="npSource" type="button" aria-label="View album/track details">
    <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
  </button>
  <div class="np__cover-wrap">
    <img id="npCover" class="np__cover" alt="" />
  </div>
  <div class="np__meta">
    <h2 class="np__title" id="npTitle">—</h2>
    <p class="np__artist" id="npArtist">—</p>
  </div>
  <div class="np__scrub">
    <div class="scrub" id="npScrub"><div class="scrub__fill" id="npScrubFill"></div></div>
    <div class="np__times">
      <span id="npCurTime">0:00</span>
      <span id="npTotTime">0:00</span>
    </div>
  </div>
  <div class="np__controls">
    <button class="np__btn" id="npPrev" aria-label="Previous">
      <svg viewBox="0 0 24 24" width="30" height="30" aria-hidden="true"><path fill="currentColor" d="M6 6h2v12H6zM20 6v12L9 12z"/></svg>
    </button>
    <button class="np__btn np__btn--play" id="npPlay" aria-label="Play/Pause">
      <svg id="npIconPlay" viewBox="0 0 24 24" width="34" height="34" aria-hidden="true"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
      <svg id="npIconPause" viewBox="0 0 24 24" width="34" height="34" aria-hidden="true" style="display:none"><path fill="currentColor" d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
    </button>
    <button class="np__btn" id="npNext" aria-label="Next">
      <svg viewBox="0 0 24 24" width="30" height="30" aria-hidden="true"><path fill="currentColor" d="M16 6h2v12h-2zM4 6v12l11-6z"/></svg>
    </button>
  </div>
  <a class="np__yt" id="npYtBtn" target="_blank" rel="noopener" href="#">
    <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M21.58 7.19a2.51 2.51 0 0 0-1.77-1.77C18.25 5 12 5 12 5s-6.25 0-7.81.42A2.51 2.51 0 0 0 2.42 7.19 26.06 26.06 0 0 0 2 12a26.06 26.06 0 0 0 .42 4.81 2.51 2.51 0 0 0 1.77 1.77C5.75 19 12 19 12 19s6.25 0 7.81-.42a2.51 2.51 0 0 0 1.77-1.77A26.06 26.06 0 0 0 22 12a26.06 26.06 0 0 0-.42-4.81zM10 15V9l5.2 3z"/></svg>
    <span>Watch on YouTube</span>
  </a>
</div>

<script src="app.js?v=7.7"></script>
</body>
</html>

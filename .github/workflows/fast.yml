name: Scrape (fast) & Deploy

on:
  schedule:
    # Every 4 hours.
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      fast_pages:
        description: 'Pages per section in fast pass (default 50)'
        required: false
        default: '50'
      max_details:
        description: 'Max detail-page fetches this run (default 1500)'
        required: false
        default: '1500'
      skip_smoke:
        description: 'Skip parser smoke test (use only if test is flaky but parser is OK)'
        required: false
        default: 'no'
        type: choice
        options: ['no', 'yes']
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'scraper/**'
      - '.github/workflows/**'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: scrape-deploy
  cancel-in-progress: false

jobs:
  scrape:
    name: Fast scrape
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install deps
        run: pip install -r scraper/requirements.txt

      - name: Smoke-test parsers
        # Catches djjohal HTML changes BEFORE we overwrite the DB with
        # bad parses. If this fails, the scrape step won't run.
        # Can be bypassed with skip_smoke=yes on manual dispatch.
        env:
          SKIP_SMOKE: ${{ github.event.inputs.skip_smoke || 'no' }}
        run: python scraper/smoke_test.py

      - name: Backup library.db
        # Keep one rolling backup committed alongside the DB. If a future
        # run somehow corrupts library.db (bad parse, partial write, etc.)
        # we can recover by copying data/library.db.bak over it.
        run: |
          if [ -f data/library.db ]; then
            cp data/library.db data/library.db.bak
            echo "Backup made: $(stat -c%s data/library.db.bak) bytes"
          fi

      - name: Run scraper (fast)
        env:
          MODE:               fast
          FAST_PAGES:         ${{ github.event.inputs.fast_pages   || '50' }}
          MAX_DETAIL_FETCHES: ${{ github.event.inputs.max_details  || '1500' }}
        run: python scraper/scrape.py

      - name: Commit updated data
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Sanity-check the JSON we wrote before considering committing.
          # If a previous run left conflict markers in the working tree
          # (or the scraper itself wrote malformed JSON), bail loudly
          # rather than commit something the site will fail to load.
          for f in data/songs.json data/search.json; do
            if grep -q '^<<<<<<<' "$f" 2>/dev/null; then
              echo "::error::Conflict markers found in $f — aborting commit"
              exit 1
            fi
            python -c "import json; json.load(open('$f'))" || {
              echo "::error::Invalid JSON in $f — aborting commit"
              exit 1
            }
          done

          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "data (fast): $(date -u +'%Y-%m-%d %H:%M UTC')"

          # Retry push up to 3 times. Between attempts, rebase onto the
          # latest main — covers the case where the deep scraper (or a
          # manual push) committed in the gap between our `git fetch`
          # at job start and our `git push` now.
          for attempt in 1 2 3; do
            if git push; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push failed on attempt $attempt, rebasing and retrying..."
            git fetch origin main
            # Re-validate after rebase in case the rebase itself
            # introduces conflict markers (it shouldn't with atomic
            # writes, but defense in depth).
            if ! git rebase origin/main; then
              git rebase --abort || true
              echo "::error::Rebase conflict — bailing without push"
              exit 1
            fi
            for f in data/songs.json data/search.json; do
              if grep -q '^<<<<<<<' "$f" 2>/dev/null; then
                echo "::error::Post-rebase conflict markers in $f — aborting"
                exit 1
              fi
            done
          done
          echo "::error::Push failed after 3 attempts"
          exit 1

  deploy:
    name: Deploy site to GitHub Pages
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with: { ref: main }

      - name: Assemble site
        run: |
          mkdir -p _site/data/items
          cp -r site/* _site/
          cp data/songs.json   _site/data/songs.json
          cp data/search.json  _site/data/search.json
          if [ -d data/items ]; then
            cp -r data/items/* _site/data/items/ 2>/dev/null || true
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with: { path: _site }

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

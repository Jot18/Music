name: Scrape & Deploy

on:
  schedule:
    # Every 4 hours.
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Scrape mode'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto          # full if library small, otherwise recent
          - full          # walk every page (slow; spans multiple runs)
          - recent        # walk only the first N pages of each section
      recent_pages:
        description: 'Pages per section when mode=recent (default 5)'
        required: false
        default: '5'
      max_details:
        description: 'Max detail-page fetches this run (default 800)'
        required: false
        default: '800'
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'scraper/**'
      - '.github/workflows/scrape.yml'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: scrape-deploy
  cancel-in-progress: false

jobs:
  scrape:
    name: Scrape source
    runs-on: ubuntu-latest
    timeout-minutes: 350    # within Actions' 6-hour single-job cap
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install deps
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        env:
          DEEP_SCRAPE:        ${{ github.event.inputs.mode         || 'auto' }}
          RECENT_PAGES:       ${{ github.event.inputs.recent_pages || '5' }}
          MAX_DETAIL_FETCHES: ${{ github.event.inputs.max_details  || '800' }}
        run: python scraper/scrape.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: refresh ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi

  deploy:
    name: Deploy site to GitHub Pages
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout (with latest data commit)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Assemble site
        run: |
          mkdir -p _site/data/items
          cp -r site/* _site/
          # Ship the small homepage feed and the search index.
          cp data/songs.json   _site/data/songs.json
          cp data/search.json  _site/data/search.json
          # Ship per-item detail JSONs for on-demand loading.
          # We don't ship library.db — the site doesn't need it.
          if [ -d data/items ]; then
            cp -r data/items/* _site/data/items/ 2>/dev/null || true
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Scrape & Deploy

on:
  schedule:
    # Every 4 hours at minute 0 (UTC).
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      deep_scrape:
        description: 'Walk every paginated page (slow; use sparingly)'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto       # deep if archive is empty, else incremental (default)
          - yes        # force full deep walk
          - no         # force incremental even on empty archive
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'scraper/**'
      - '.github/workflows/scrape.yml'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: scrape-deploy
  cancel-in-progress: false

jobs:
  scrape:
    name: Scrape source
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install deps
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        env:
          # On manual dispatch: use the chosen mode. On schedule/push: 'auto'.
          DEEP_SCRAPE: ${{ github.event.inputs.deep_scrape || 'auto' }}
        run: python scraper/scrape.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain data/songs.json)" ]]; then
            git add data/songs.json
            git commit -m "data: refresh songs.json ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          else
            echo "No changes to commit."
          fi

  deploy:
    name: Deploy site to GitHub Pages
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout (with latest data commit)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r site/* _site/
          mkdir -p _site/data
          cp data/songs.json _site/data/songs.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

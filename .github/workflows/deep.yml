name: Scrape (deep, background)

on:
  schedule:
    # Every 6 hours, offset by 2h so it doesn't collide with the fast scraper.
    - cron: '0 2,8,14,20 * * *'
  workflow_dispatch:
    inputs:
      pages_per_session:
        description: 'Pages per section this session (default 200)'
        required: false
        default: '200'
      max_details:
        description: 'Max detail-page fetches this run (default 1500)'
        required: false
        default: '1500'
      reset:
        description: 'Reset crawl state and start from page 1 again'
        required: false
        default: 'no'
        type: choice
        options: [no, yes]
      skip_smoke:
        description: 'Skip parser smoke test (use only if test is flaky but parser is OK)'
        required: false
        default: 'no'
        type: choice
        options: ['no', 'yes']

permissions:
  contents: write

# Don't run two deep sessions simultaneously, and don't fight the fast scraper.
concurrency:
  group: scrape-deploy
  cancel-in-progress: false

jobs:
  deep:
    name: Deep scrape session
    runs-on: ubuntu-latest
    # Deep scrapes can take a while when fetching detail pages for hundreds
    # of newly-discovered items. Leave headroom but stay safely under the
    # 6-hour Actions ceiling.
    timeout-minutes: 330
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install deps
        run: pip install -r scraper/requirements.txt

      - name: Smoke-test parsers
        env:
          SKIP_SMOKE: ${{ github.event.inputs.skip_smoke || 'no' }}
        run: python scraper/smoke_test.py

      - name: Backup library.db
        run: |
          if [ -f data/library.db ]; then
            cp data/library.db data/library.db.bak
          fi

      - name: Run scraper (deep)
        env:
          MODE:               deep
          PAGES_PER_SESSION:  ${{ github.event.inputs.pages_per_session || '200' }}
          MAX_DETAIL_FETCHES: ${{ github.event.inputs.max_details       || '1500' }}
          RESET_DEEP:         ${{ github.event.inputs.reset             || 'no' }}
        run: python scraper/scrape.py

      - name: Commit updated data
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Validate JSON before committing — never let bad data ship.
          for f in data/songs.json data/search.json; do
            if grep -q '^<<<<<<<' "$f" 2>/dev/null; then
              echo "::error::Conflict markers found in $f — aborting commit"
              exit 1
            fi
            python -c "import json; json.load(open('$f'))" || {
              echo "::error::Invalid JSON in $f — aborting commit"
              exit 1
            }
          done

          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "data (deep): $(date -u +'%Y-%m-%d %H:%M UTC')"

          for attempt in 1 2 3; do
            if git push; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push failed on attempt $attempt, rebasing and retrying..."
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort || true
              echo "::error::Rebase conflict — bailing without push"
              exit 1
            fi
            for f in data/songs.json data/search.json; do
              if grep -q '^<<<<<<<' "$f" 2>/dev/null; then
                echo "::error::Post-rebase conflict markers in $f — aborting"
                exit 1
              fi
            done
          done
          echo "::error::Push failed after 3 attempts"
          exit 1
